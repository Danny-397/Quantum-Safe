# Run the full QuantumSafe stack locally:
#   docker compose up --build
# Dashboard -> http://localhost:3000   API -> http://localhost:5000
services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=dev-secret-change-me-0123456789abcdef
      - JWT_SECRET_KEY=dev-jwt-change-me-0123456789abcdef
      - DATABASE_URL=sqlite:////data/quantumsafe.db
      - FRONTEND_ORIGIN=http://localhost:3000
      - DASHBOARD_URL=http://localhost:3000
      - API_URL=http://localhost:5000
    volumes:
      - qs-data:/data

  web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  qs-data:
